name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main
      - develop

env:
  GCP_REGION: europe-west3
  ARTIFACT_REGISTRY: europe-west3-docker.pkg.dev

jobs:
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set environment variables
        run: |
          if [[ "${{ github.event.workflow_run.head_branch }}" == "main" ]]; then
            echo "ENVIRONMENT=prod" >> $GITHUB_ENV
            echo "SERVICE_NAME=bookit-api-prod" >> $GITHUB_ENV
          else
            echo "ENVIRONMENT=staging" >> $GITHUB_ENV
            echo "SERVICE_NAME=bookit-api-staging" >> $GITHUB_ENV
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.ARTIFACT_REGISTRY }}

      - name: Build and push Docker image
        run: |
          IMAGE="${{ env.ARTIFACT_REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/bookit/${{ env.SERVICE_NAME }}:${{ github.sha }}"
          docker build -t $IMAGE ./api
          docker push $IMAGE
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image ${{ env.IMAGE }} \
            --region ${{ env.GCP_REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --add-cloudsql-instances=${{ secrets.GCP_PROJECT_ID }}:europe-west3:bookit-db \
            --set-secrets="DATABASE_URL=bookit-database-url-${{ env.ENVIRONMENT }}:latest,JWT_SECRET=bookit-jwt-secret-${{ env.ENVIRONMENT }}:latest" \
            --set-env-vars="ENVIRONMENT=${{ env.ENVIRONMENT }},LOG_LEVEL=info,GCP_PROJECT=${{ secrets.GCP_PROJECT_ID }}" \
            --min-instances=0 \
            --max-instances=10 \
            --memory=256Mi \
            --cpu=1 \
            --timeout=60s \
            --concurrency=80

      - name: Verify deployment
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} --region ${{ env.GCP_REGION }} --format='value(status.url)')
          echo "Service URL: $URL"

          # Wait for service to be ready
          sleep 10

          # Health check
          HEALTH_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL/api/v1/health")
          if [[ "$HEALTH_STATUS" != "200" ]]; then
            echo "Health check failed with status $HEALTH_STATUS"
            exit 1
          fi
          echo "Health check passed"
