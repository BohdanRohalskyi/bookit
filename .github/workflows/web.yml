name: Web
run-name: "Web - ${{ github.event_name == 'push' && 'Production' || 'Staging' }}"

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/web.yml'
  pull_request:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/web.yml'

permissions:
  checks: write
  contents: read
  pull-requests: write

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Lint
        working-directory: web
        run: npm run lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Typecheck
        working-directory: web
        run: npm run typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [lint, typecheck]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Run tests with coverage
        working-directory: web
        run: npm run coverage

      - name: Coverage report — shared
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          name: Shared
          json-summary-path: web/packages/shared/coverage/coverage-summary.json
          json-final-path: web/packages/shared/coverage/coverage-final.json

      - name: Coverage report — consumer
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          name: Consumer
          json-summary-path: web/packages/consumer/coverage/coverage-summary.json
          json-final-path: web/packages/consumer/coverage/coverage-final.json

      - name: Coverage report — biz
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          name: Biz
          json-summary-path: web/packages/biz/coverage/coverage-summary.json
          json-final-path: web/packages/biz/coverage/coverage-final.json

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Set environment variables
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "VITE_API_URL=${{ secrets.VITE_API_URL }}" >> $GITHUB_ENV
            echo "VITE_CONSUMER_URL=https://pt-duo-bookit.web.app" >> $GITHUB_ENV
            echo "VITE_BIZ_URL=https://pt-duo-bookit-biz.web.app" >> $GITHUB_ENV
          else
            echo "VITE_API_URL=${{ secrets.VITE_API_URL_STAGING }}" >> $GITHUB_ENV
            echo "VITE_CONSUMER_URL=https://bookit-staging.web.app" >> $GITHUB_ENV
            echo "VITE_BIZ_URL=https://bookit-biz-staging.web.app" >> $GITHUB_ENV
          fi
          echo "VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }}" >> $GITHUB_ENV
          echo "VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID }}" >> $GITHUB_ENV
          echo "VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}" >> $GITHUB_ENV
          echo "VITE_FIREBASE_PROJECT_ID=${{ secrets.VITE_FIREBASE_PROJECT_ID }}" >> $GITHUB_ENV

      - name: Build Consumer
        working-directory: web
        run: npm run build:consumer

      - name: Build Biz
        working-directory: web
        run: npm run build:biz

      - name: Upload Consumer artifact
        uses: actions/upload-artifact@v4
        with:
          name: consumer-dist
          path: web/packages/consumer/dist

      - name: Upload Biz artifact
        uses: actions/upload-artifact@v4
        with:
          name: biz-dist
          path: web/packages/biz/dist

  deploy-consumer:
    name: Deploy Consumer
    runs-on: ubuntu-latest
    needs: [build]

    steps:
      - uses: actions/checkout@v4

      - name: Download Consumer artifact
        uses: actions/download-artifact@v4
        with:
          name: consumer-dist
          path: web/packages/consumer/dist

      - name: Set deploy target
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "DEPLOY_TARGET=consumer-prod" >> $GITHUB_ENV
          else
            echo "DEPLOY_TARGET=consumer-staging" >> $GITHUB_ENV
          fi

      - name: Deploy Consumer to Firebase
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: pt-duo-bookit
          target: ${{ env.DEPLOY_TARGET }}
          entryPoint: web

  deploy-biz:
    name: Deploy Biz
    runs-on: ubuntu-latest
    needs: [build]

    steps:
      - uses: actions/checkout@v4

      - name: Download Biz artifact
        uses: actions/download-artifact@v4
        with:
          name: biz-dist
          path: web/packages/biz/dist

      - name: Set deploy target
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "DEPLOY_TARGET=biz-prod" >> $GITHUB_ENV
          else
            echo "DEPLOY_TARGET=biz-staging" >> $GITHUB_ENV
          fi

      - name: Deploy Biz to Firebase
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: pt-duo-bookit
          target: ${{ env.DEPLOY_TARGET }}
          entryPoint: web
