name: Web Deploy

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/web.yml'
  pull_request:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/web.yml'

permissions:
  checks: write
  contents: read
  pull-requests: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Set environment variables
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "VITE_API_URL=${{ secrets.VITE_API_URL }}" >> $GITHUB_ENV
          else
            echo "VITE_API_URL=${{ secrets.VITE_API_URL_STAGING }}" >> $GITHUB_ENV
          fi

      - name: Build
        working-directory: web
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [build]

    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web/dist

      - name: Set deploy target
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "DEPLOY_TARGET=prod" >> $GITHUB_ENV
          else
            echo "DEPLOY_TARGET=staging" >> $GITHUB_ENV
          fi

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: pt-duo-bookit
          target: ${{ env.DEPLOY_TARGET }}
          entryPoint: web
