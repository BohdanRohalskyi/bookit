version: "2"

run:
  timeout: 5m
  tests: true

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - misspell
    - gosec
    - bodyclose
    - noctx

  settings:
    errcheck:
      check-blank: true
    gosec:
      severity: medium
      confidence: medium
    misspell:
      locale: US

  exclusions:
    rules:
      # Exclude generated files
      - path: types\.gen\.go
        linters:
          - gosec
          - errcheck
      - path: _test\.go
        linters:
          - gosec
          - errcheck

formatters:
  enable:
    - gofmt
    - goimports
