run:
  timeout: 5m
  tests: true

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - gosec
    - bodyclose
    - noctx

linters-settings:
  errcheck:
    check-blank: true
  gosec:
    severity: medium
    confidence: medium
  misspell:
    locale: US

issues:
  exclude-rules:
    # Exclude generated files
    - path: types\.gen\.go
      linters:
        - gosec
        - errcheck
    - path: _test\.go
      linters:
        - gosec
        - errcheck
