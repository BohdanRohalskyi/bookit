        business_id:
          type: string
          format: uuid
        name:
          type: string
          minLength: 1
          maxLength: 100
        description:
          type: string
          maxLength: 1000
        duration_minutes:
          type: integer
          minimum: 1
        price:
          type: number
          format: double
          minimum: 0
        currency:
          type: string
          default: "EUR"
        equipment_requirements:
          type: array
          items:
            type: object
            required: [equipment_id, quantity_needed]
            properties:
              equipment_id:
                type: string
                format: uuid
              quantity_needed:
                type: integer
                minimum: 1
        staff_requirements:
          type: array
          items:
            type: object
            required: [staff_role_id, quantity_needed]
            properties:
              staff_role_id:
                type: string
                format: uuid
              quantity_needed:
                type: integer
                minimum: 1

