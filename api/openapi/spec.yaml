        description:
          type: string
          nullable: true
        duration_minutes:
          type: integer
        price:
          type: number
          format: double
        currency:
          type: string
          minLength: 3
          maxLength: 3
          example: "EUR"
        equipment_requirements:
          type: array
          items:
            $ref: '#/components/schemas/ServiceEquipmentRequirement'
        staff_requirements:
          type: array
          items:
            $ref: '#/components/schemas/ServiceStaffRequirement'
