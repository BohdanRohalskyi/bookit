          format: uuid
        date:
          type: string
          format: date
        is_closed:
          type: boolean
        open_time:
          type: string
          nullable: true
        close_time:
          type: string
          nullable: true
        reason:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time

