    # ----------------------------------------------------------
    # Catalog - Schedule
    # ----------------------------------------------------------
    Schedule:
      type: object
      required: [location_id, days]
      properties:
        location_id:
          type: string
          format: uuid
        days:
          type: array
          items:
            $ref: '#/components/schemas/ScheduleDay'
        exceptions:
          type: array
          items:
            $ref: '#/components/schemas/ScheduleException'
          description: Upcoming exceptions (returned on GET)

    ScheduleDay:
      type: object
      required: [day_of_week, is_open]
      properties:
        id:
          type: string
          format: uuid
        day_of_week:
          type: integer
          minimum: 0
          maximum: 6
          description: "0 = Monday, 6 = Sunday"
        is_open:
          type: boolean
        open_time:
          type: string
          pattern: '^\d{2}:\d{2}$'
          example: "09:00"
          nullable: true
        close_time:
          type: string
          pattern: '^\d{2}:\d{2}$'
          example: "18:00"
          nullable: true

    ScheduleDayInput:
      type: object
      required: [day_of_week, is_open]
      properties:
        day_of_week:
          type: integer
          minimum: 0
          maximum: 6
        is_open:
          type: boolean
        open_time:
          type: string
          nullable: true
        close_time:
          type: string
          nullable: true

    ScheduleException:
      type: object
