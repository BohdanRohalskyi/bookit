      summary: Health check
      description: |
        Health check endpoint for Cloud Run liveness and readiness probes.
        Returns service health status and basic diagnostics.
      operationId: healthCheck
      security: []  # No auth required
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '503':
          description: Service is unhealthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

# ============================================================
# COMPONENTS
# ============================================================
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    PageParam:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1

    PerPageParam:
      name: per_page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

    BusinessId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

    LocationId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

    ServiceId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

    BookingId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

    StaffId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

    EquipmentId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    Unauthorized:
      description: Authentication required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            message: "Authentication required"

    ProviderRequired:
      description: Provider account required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            message: "Provider account required"

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            message: "Resource not found"

    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationError'

  schemas:
    # ----------------------------------------------------------
    # Common
    # ----------------------------------------------------------
    Error:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          example: "Something went wrong"

    ValidationError:
      type: object
      required:
        - message
        - errors
      properties:
        message:
          type: string
          example: "Validation failed"
        errors:
          type: object
          additionalProperties:
            type: string
          example:
            email: "Invalid email format"
            phone: "Required"

    HealthResponse:
      type: object
      required:
        - status
        - timestamp
      properties:
        status:
          type: string
          enum: [healthy, unhealthy]
          example: "healthy"
        timestamp:
          type: string
          format: date-time
          example: "2026-04-01T12:00:00Z"
        version:
          type: string
          description: Application version
          example: "1.0.0"
        checks:
          type: object
          description: Individual health check results
          properties:
            database:
              type: string
              enum: [ok, error]
            pubsub:
              type: string
              enum: [ok, error]

    Pagination:
      type: object
      required:
        - page
        - per_page
        - total
        - total_pages
      properties:
        page:
          type: integer
          example: 1
        per_page:
          type: integer
          example: 20
        total:
          type: integer
          example: 45
        total_pages:
          type: integer
          example: 3

    # ----------------------------------------------------------
    # Auth
    # ----------------------------------------------------------
    OAuthProvider:
      type: string
      enum: [google, facebook, paysera]

    RegisterRequest:
      type: object
      required:
        - email
        - password
        - name
        - phone
      properties:
        email:
          type: string
          format: email
          example: "user@example.com"
        password:
          type: string
          minLength: 8
          example: "securepassword123"
        name:
          type: string
          minLength: 1
          maxLength: 100
          example: "John Doe"
        phone:
          type: string
          example: "+37061234567"

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: "user@example.com"
        password:
          type: string
          example: "securepassword123"

    RefreshRequest:
      type: object
      required:
        - refresh_token
      properties:
        refresh_token:
          type: string

    LogoutRequest:
      type: object
      required:
        - refresh_token
      properties:
        refresh_token:
          type: string

    VerifyEmailRequest:
      type: object
      required:
        - token
      properties:
        token:
          type: string
          description: Email verification token from the verification link

    ForgotPasswordRequest:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          format: email
          example: "user@example.com"

    ResetPasswordRequest:
      type: object
      required:
        - token
        - password
      properties:
        token:
          type: string
          description: Password reset token from the email link
        password:
          type: string
          minLength: 8
          description: New password

    AppSwitchTokenResponse:
      type: object
      required:
        - token
      properties:
        token:
          type: string
          description: One-time token for switching between apps (5 min TTL)

    ExchangeAppSwitchTokenRequest:
      type: object
      required:
        - token
      properties:
        token:
          type: string
          description: The app switch token to exchange

    MessageResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          example: "Operation completed successfully"

    AuthResponse:
      type: object
      required:
        - user
        - tokens
      properties:
        user:
          $ref: '#/components/schemas/User'
        tokens:
          $ref: '#/components/schemas/AuthTokens'

    AuthTokens:
      type: object
      required:
        - access_token
        - refresh_token
        - expires_in
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        expires_in:
          type: integer
          description: Access token expiry in seconds
          example: 1800

