  # ============================================================
  # PAYMENTS
  # ============================================================
  /api/v1/payments/webhook:
    post:
      tags: [Payments]
      summary: Paysera payment callback
      description: |
        Webhook endpoint for Paysera payment notifications.
        Paysera sends payment status updates to this endpoint.
        The request is verified using Paysera's signature mechanism.
      operationId: paymentWebhook
      security: []  # No JWT auth - verified by Paysera signature
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                data:
                  type: string
                  description: Base64 encoded payment data
                ss1:
                  type: string
                  description: MD5 signature
                ss2:
                  type: string
                  description: RSA signature
              required:
                - data
                - ss1
      responses:
        '200':
          description: Webhook processed successfully
          content:
            text/plain:
              schema:
                type: string
                example: "OK"
        '400':
          description: Invalid request or signature verification failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

