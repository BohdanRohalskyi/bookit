services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: bookit
      POSTGRES_PASSWORD: bookit
      POSTGRES_DB: bookit
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bookit -d bookit"]
      interval: 5s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1

  api:
    build: ./api
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://bookit:bookit@db:5432/bookit?sslmode=disable
      JWT_SECRET: local-dev-secret-for-docker-compose-only
      ENVIRONMENT: local
      LOG_LEVEL: debug
      APP_URL: http://localhost:5173
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:5174
      MAIL_PROVIDER: smtp
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      MAIL_FROM: noreply@bookit.app
    depends_on:
      db:
        condition: service_healthy
      mailpit:
        condition: service_started

  consumer:
    build:
      context: ./web
      dockerfile: Dockerfile.dev
    command: npm run dev -w packages/consumer -- --host
    ports:
      - "5173:5173"
    volumes:
      - ./web:/app
      - web_node_modules:/app/node_modules
    environment:
      VITE_API_URL: http://localhost:8080
    depends_on:
      - api

  biz:
    build:
      context: ./web
      dockerfile: Dockerfile.dev
    command: npm run dev -w packages/biz -- --host
    ports:
      - "5174:5174"
    volumes:
      - ./web:/app
      - web_node_modules:/app/node_modules
    environment:
      VITE_API_URL: http://localhost:8080
      VITE_CONSUMER_URL: http://localhost:5173
    depends_on:
      - api


  lint:
    image: golangci/golangci-lint:v2.11.4
    volumes:
      - ./api:/app
    working_dir: /app
    profiles: ["tools"]
    command: golangci-lint run ./...

  go-tools:
    image: golang:1.25-alpine
    volumes:
      - ./api:/app
      - go_mod_cache:/go/pkg/mod
    working_dir: /app
    environment:
      GOPATH: /go
      GOCACHE: /go/cache
    profiles: ["tools"]

  migrate-cli:
    image: migrate/migrate
    volumes:
      - ./api/migrations:/migrations
    networks:
      - default
    profiles: ["tools"]

volumes:
  postgres_data:
  web_node_modules:
  go_mod_cache:
