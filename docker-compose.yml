services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: bookit
      POSTGRES_PASSWORD: bookit
      POSTGRES_DB: bookit
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bookit -d bookit"]
      interval: 5s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1

  migrate:
    image: migrate/migrate:latest
    volumes:
      - ./api/migrations:/migrations
    command: [
      "-path", "/migrations",
      "-database", "postgres://bookit:bookit@db:5432/bookit?sslmode=disable",
      "up"
    ]
    depends_on:
      db:
        condition: service_healthy

  api:
    build: ./api
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://bookit:bookit@db:5432/bookit?sslmode=disable
      JWT_SECRET: local-dev-secret
      ENVIRONMENT: local
      LOG_LEVEL: debug
      APP_URL: http://localhost:5173
      MAIL_PROVIDER: smtp
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      MAIL_FROM: noreply@bookit.app
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      mailpit:
        condition: service_started

volumes:
  postgres_data:
